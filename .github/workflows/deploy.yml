name: Build & Deploy to Ionos

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy PHP API into build folder
        run: |
          cp -r api dist/api
          cat > dist/api/config.php << EOF
          <?php
          define('DB_HOST', '${DB_HOST}');
          define('DB_NAME', '${DB_NAME}');
          define('DB_USER', '${DB_USER}');
          define('DB_PASS', '${DB_PASS}');
          define('ANTHROPIC_API_KEY', '${ANTHROPIC_API_KEY}');
          EOF
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy via FTP to Ionos
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          find dist -type f | while IFS= read -r file; do
            remote="${file#dist/}"
            echo "Uploading: $remote"
            curl --ipv4 --silent --show-error \
              --connect-timeout 15 \
              --max-time 60 \
              --ftp-create-dirs \
              --upload-file "$file" \
              "ftp://${FTP_HOST}/${remote}" \
              --user "${FTP_USER}:${FTP_PASS}"
          done
          echo "Deploy complete."
