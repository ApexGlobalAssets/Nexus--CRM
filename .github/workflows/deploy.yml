name: Build & Deploy to Ionos

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy PHP API into build folder
        run: |
          cp -r api dist/api
          python3 - << 'PYEOF'
          import os, json
          vals = {
            'DB_HOST': os.environ['DB_HOST'],
            'DB_NAME': os.environ['DB_NAME'],
            'DB_USER': os.environ['DB_USER'],
            'DB_PASS': os.environ['DB_PASS'],
            'ANTHROPIC_API_KEY': os.environ.get('ANTHROPIC_API_KEY', ''),
          }
          lines = ['<?php']
          for k, v in vals.items():
            lines.append("define('{}', {});".format(k, json.dumps(v)))
          with open('dist/api/config.php', 'w') as f:
            f.write('\n'.join(lines) + '\n')
          PYEOF
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy via SFTP to Ionos
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USER }}
          SFTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -p "$SFTP_PASS" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            dist/ "${SFTP_USER}@${SFTP_HOST}:/nexuscrm/"
